<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروب مكة</title>

    <meta property="og:title" content="دروب مكة">
    <meta property="og:description" content="دليلكم الرقمي في المشاعر المقدسة">
    <meta property="og:image" content="https://layan89.github.io/Duroob-mecca/images/kaaba.JPG">
    <meta property="og:type" content="website">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* تم ضبط الامتداد إلى JPG كبير ليطابق صورتك */
            background: linear-gradient(rgba(44, 0, 63, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('images/kaaba.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 85%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h1 {
            color: #d4af37;
            font-size: 2.3rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
            padding: 20px;
            border-radius: 15px;
            border-right: 5px solid #d4af37;
            transition: 0.3s ease;
        }

        h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: bold;
            color: #ffffff;
        }

        p {
            margin: 8px 0 0;
            font-size: 0.9rem;
            color: #cccccc;
        }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>دروب مكة</h1>
        <p class="subtitle">مساعدكم في رحلتكم الإيمانية</p>

        <div class="card">
            <h2>مكة المكرمة</h2>
            <p>إرشادات المسجد الحرام والمنطقة المركزية</p>
        </div>

        <div class="card">
            <h2>منى</h2>
            <p>مواقع المخيمات والخدمات اللوجستية</p>
        </div>

        <div class="card">
            <h2>عرفات</h2>
            <p>خرائط الوقوف والمسارات المعتمدة</p>
        </div>

        <div class="card">
            <h2>النقل والخدمات</h2>
            <p>محطات الحافلات والقطار والخدمات العامة</p>
        </div>

        <footer>
            جميع الحقوق محفوظة &copy; 2026
        </footer>
    </div>

</body>
</html>
