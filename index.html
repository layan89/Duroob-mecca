<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروب مكة</title>

    <meta property="og:title" content="دروب مكة">
    <meta property="og:description" content="دليلكم في المشاعر المقدسة">
    <meta property="og:image" content="https://layan89.github.io/Duroob-mecca/images/kaaba.JPG">
    <meta property="og:type" content="website">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(44, 0, 63, 0.65), rgba(0, 0, 0, 0.7)), 
                        url('images/kaaba.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 85%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        h1 {
            color: #d4af37;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .description {
            font-size: 1.1rem;
            color: #eeeeee;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid #d4af37;
        }

        h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        p {
            margin: 8px 0 0;
            font-size: 0.95rem;
            color: #ccc;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>دروب مكة</h1>
        <p class="description">مساعدك داخل مكة والمشاعر المقدسة</p>

        <div class="card">
            <h2>مكة المكرمة</h2>
            <p>معلومات وإرشادات داخل المدينة المقدسة</p>
        </div>

        <div class="card">
            <h2>منى</h2>
            <p>أماكن المخيمات ومسارات الحجاج</p>
        </div>

        <div class="card">
            <h2>عرفات</h2>
            <p>تعليمات يوم عرفة وأماكن التواجد</p>
        </div>

        <div class="card">
            <h2>الباصات والعربات</h2>
            <p>أماكن التنقل والمسارات الرئيسية</p>
        </div>

        <footer>
            جميع الحقوق محفوظة - 2026
        </footer>
    </div>

</body>
</html>
